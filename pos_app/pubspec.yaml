name: pos_app
description: Local POS app (SQLite + PDF) with colorful UI
publish_to: "none"

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.3
  sqflite: ^2.3.0
  path_provider: ^2.1.3
  intl: ^0.19.0
  pdf: ^3.10.7
  url_launcher: ^6.3.0
  crypto: ^3.0.3
  http: ^1.2.2


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
