name: task_manager
description: "A Task Manager app with admin and user roles."
publish_to: 'none'

version: 1.0.1+6

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  animations: ^2.0.11
  emailjs: ^4.0.0
  http: ^1.2.0

  # State Management
  flutter_riverpod: ^2.5.1
  freezed_annotation: ^2.4.1

  # Auth & Backend
  supabase_flutter: ^2.6.0
  google_sign_in: ^6.2.1
  flutter_secure_storage: ^9.0.0

  # Storage
  shared_preferences: ^2.2.3

  # HTTP
  dio: ^5.4.3

  # Utilities
  intl: ^0.19.0
  json_annotation: ^4.8.1
  uuid: ^4.5.2
  path: ^1.9.0
  path_provider: ^2.1.3

  # Image
  image_picker: ^1.0.9
  connectivity_plus: ^7.0.0
  share_plus: ^10.0.0
  package_info_plus: ^9.0.0
  flutter_screenutil: ^5.9.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.7
  json_serializable: ^6.7.1
  freezed: ^2.4.6
  riverpod_generator: ^2.3.9
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/logo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/logo.png